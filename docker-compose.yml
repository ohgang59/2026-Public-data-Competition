services:
  testmate:
    build:
      context: .
      args:
        GIT_SHA: ${GIT_SHA:-unknown}
        BUILD_DATE: ${BUILD_DATE:-unknown}
    image: ktl-testmate:latest
    container_name: ktl-testmate
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      AI_PROVIDER: ${AI_PROVIDER:-openai}
      AI_MODEL: ${AI_MODEL:-gpt-4.1-mini}
    ports:
      - "5002:8765"
    volumes:
      # mount your CSV here. file inside should be: 통합_시험접수_현황.csv
      - ./data:/app/data
      # persist trained model + sqlite DB across restarts
      - ./backend/artifacts:/app/backend/artifacts
      - testmate-db:/app/backend/data
    restart: unless-stopped

volumes:
  testmate-db:

